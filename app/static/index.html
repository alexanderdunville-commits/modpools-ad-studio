<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Modpools Ad Manager</title>
  <style>
    :root {
      --bg: #0e1621; --panel: #16212e; --panel-2: #1d2a39; --panel-3:#233244;
      --line: #2a3a4d; --text: #e8eef5; --muted: #93a4b7; --faint:#6b7b8d;
      --accent: #38bdf8; --accent-2: #0ea5e9; --good: #34d399; --warn:#fbbf24;
      --bad: #f87171; --radius: 12px;
    }
    * { box-sizing: border-box; }
    html,body { height:100%; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    a { color: var(--accent); }
    .app { display: grid; grid-template-columns: 232px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }
    /* sidebar */
    .side { grid-row: 1 / 3; background: #0b131c; border-right: 1px solid var(--line); padding: 16px 12px; overflow:auto; }
    .brand { display:flex; align-items:center; gap:9px; padding: 4px 8px 16px; }
    .brand .dot { width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
    .brand b { font-size: 15px; letter-spacing:.2px; }
    .navsec { color: var(--faint); font-size: 11px; text-transform: uppercase; letter-spacing:.06em; margin: 14px 10px 6px; }
    .nav { display:flex; flex-direction:column; gap:2px; }
    .nav a { display:flex; align-items:center; gap:10px; padding: 8px 10px; border-radius: 8px; color: var(--muted); text-decoration:none; font-size:14px; cursor:pointer; }
    .nav a:hover { background: var(--panel); color: var(--text); }
    .nav a.active { background: var(--panel-2); color: var(--text); font-weight:600; }
    .nav a .ic { width:16px; text-align:center; opacity:.9; }
    .nav a .badge { margin-left:auto; background:var(--accent-2); color:#04121b; font-size:11px; font-weight:700; border-radius:999px; padding:1px 7px; }
    /* topbar */
    .top { grid-column: 2; display:flex; align-items:center; gap:12px; padding: 0 20px; border-bottom: 1px solid var(--line); background: var(--bg); }
    .top .title { font-size: 16px; font-weight:600; }
    .top .spacer { flex:1; }
    .top select, .top button { font-family:inherit; }
    .userpick { background: var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:13px; }
    .iconbtn { position:relative; background: var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:7px 10px; cursor:pointer; font-size:13px; }
    .iconbtn:hover { border-color: var(--accent); }
    .iconbtn .count { position:absolute; top:-6px; right:-6px; background:var(--bad); color:#fff; font-size:10px; font-weight:700; border-radius:999px; padding:1px 5px; }
    .estop { background:#3a1414; border:1px solid #6b2020; color:#ffb4b4; font-weight:700; border-radius:8px; padding:7px 12px; cursor:pointer; }
    .estop.on { background: var(--bad); color:#3a0d0d; }
    /* main */
    .main { grid-column: 2; overflow: auto; padding: 22px 24px 60px; }
    h2.view { margin: 0 0 4px; font-size: 20px; }
    .sub { color: var(--muted); margin: 0 0 18px; font-size:13px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .tiles { display:grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px; }
    .tile { background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding:14px 16px; }
    .tile .k { color: var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .tile .v { font-size:24px; font-weight:700; margin-top:4px; }
    .tile .v.sm { font-size:19px; }
    .card { background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding:16px; margin-bottom:14px; }
    .cardgrid { display:grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
    table { width:100%; border-collapse: collapse; font-size:14px; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); }
    th { color: var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
    tr:hover td { background: var(--panel); }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; border:1px solid var(--line); background:var(--panel-2); }
    .pill.draft{color:var(--muted)} .pill.pending{color:var(--warn);border-color:#6b5410}
    .pill.approved,.pill.active,.pill.connected,.pill.posted,.pill.live{color:var(--good);border-color:#1c6b4a}
    .pill.rejected,.pill.failed,.pill.error{color:var(--bad);border-color:#6b2020}
    .pill.scheduled,.pill.queued{color:var(--accent)}
    .pill.paused,.pill.skipped,.pill.changes_requested{color:var(--warn)}
    .pill.sandbox{color:var(--accent)} .pill.hard{color:var(--bad)} .pill.soft{color:var(--warn)}
    label { display:block; font-size:12px; color: var(--muted); margin: 12px 0 5px; }
    input, select, textarea { width:100%; background: var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:14px; font-family:inherit; }
    textarea { resize: vertical; min-height:78px; }
    input:focus, select:focus, textarea:focus { outline:none; border-color: var(--accent); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    button.btn { background: var(--accent-2); color:#04121b; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer; }
    button.btn:hover { background: var(--accent); }
    button.btn.ghost { background:var(--panel-2); color:var(--text); border:1px solid var(--line); }
    button.btn.ghost:hover { border-color:var(--accent); background:var(--panel-3); }
    button.btn.good { background: var(--good); color:#052117; }
    button.btn.bad { background: var(--bad); color:#2a0a0a; }
    button.btn.sm { padding:6px 11px; font-size:13px; }
    button.btn:disabled { opacity:.55; cursor:not-allowed; }
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .toolbar .spacer{flex:1}
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 30px; text-align:center; border:1px dashed var(--line); border-radius: var(--radius); }
    .banner { padding:11px 14px; border-radius:8px; margin-bottom:16px; font-size:14px; }
    .banner.stop { background:#3a1414; border:1px solid #6b2020; color:#ffc9c9; font-weight:600; }
    .banner.info { background:#12293b; border:1px solid #1d4a66; color:#bfe6fb; }
    .banner.warn { background:#3a2f12; border:1px solid #6b5410; color:#f5dd9a; }
    .tabs { display:flex; gap:6px; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:4px; margin-bottom:16px; width:fit-content; }
    .tabs button { background:transparent; border:none; color:var(--muted); padding:7px 14px; font-size:13px; font-weight:600; border-radius:6px; cursor:pointer; }
    .tabs button.active { background:var(--accent-2); color:#04121b; }
    .split { display:grid; grid-template-columns: 340px 1fr; gap:20px; align-items:start; }
    @media (max-width:900px){ .split{grid-template-columns:1fr} .app{grid-template-columns:64px 1fr} .brand b,.navsec,.nav a span.lbl{display:none} }
    /* variation cards */
    .vcard { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:15px; }
    .vcard h4 { margin:0 0 8px; font-size:15px; }
    .field { margin:8px 0; } .field .fk { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .field .fv { font-size:14px; white-space:pre-wrap; }
    .tag { display:inline-block; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; font-size:12px; color:var(--accent); margin:2px 3px 0 0; }
    .cta { display:inline-block; background:var(--panel-2); border:1px solid var(--line); border-radius:999px; padding:2px 10px; font-size:13px; }
    /* modal */
    .modalbg { position:fixed; inset:0; background:rgba(3,8,14,.66); display:flex; align-items:center; justify-content:center; z-index:50; }
    .modal { background: var(--panel); border:1px solid var(--line); border-radius:14px; width:min(560px,92vw); max-height:88vh; overflow:auto; padding:20px; }
    .modal h3 { margin:0 0 6px; font-size:17px; }
    .modal .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
    /* toast */
    #toast { position:fixed; right:18px; bottom:18px; display:flex; flex-direction:column; gap:8px; z-index:60; }
    .toast { background:var(--panel-3); border:1px solid var(--line); border-left:3px solid var(--accent); color:var(--text); padding:10px 14px; border-radius:8px; font-size:13px; max-width:360px; box-shadow:0 6px 24px rgba(0,0,0,.35); }
    .toast.err { border-left-color: var(--bad); } .toast.ok { border-left-color: var(--good); }
    .spinner { display:inline-block; width:15px;height:15px; border:2px solid rgba(255,255,255,.25); border-top-color:#04121b; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:7px;}
    @keyframes spin { to { transform: rotate(360deg);} }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><span class="dot"></span><b>Ad Manager</b></div>
      <div class="navsec">Workspace</div>
      <nav class="nav" id="nav-main"></nav>
      <div class="navsec">Admin</div>
      <nav class="nav" id="nav-admin"></nav>
    </aside>
    <header class="top">
      <div class="title" id="topTitle">Dashboard</div>
      <div class="spacer"></div>
      <select class="userpick" id="userPick" title="Acting as (dev role switch)"></select>
      <button class="iconbtn" id="bell" title="Notifications">🔔<span class="count" id="bellCount" style="display:none">0</span></button>
      <button class="estop" id="estop">■ Emergency Stop</button>
    </header>
    <main class="main" id="view"></main>
  </div>
  <div id="toast"></div>

  <script>
  const $ = (id) => document.getElementById(id);
  const USERS = [
    ["admin@modpools.local","Admin (admin)"],
    ["manager@modpools.local","Marketing Manager"],
    ["creator@modpools.local","Ad Creator"],
    ["approver@modpools.local","Approver"],
    ["analyst@modpools.local","Analyst (view)"],
  ];
  const PLATFORMS = [["facebook","Facebook"],["instagram","Instagram"],["google_search","Google Search"],["google_display","Google Display"],["youtube","YouTube"],["tiktok","TikTok"],["linkedin","LinkedIn"]];
  const GOALS = [["awareness","Brand awareness"],["traffic","Website traffic"],["leads","Lead generation"],["sales","Sales / conversions"],["engagement","Engagement"]];
  const LIMIT_METRICS = [["max_ads_day","Max ads / day"],["max_ads_week","Max ads / week"],["max_ads_month","Max ads / month"],["max_active_per_platform","Max active / platform"],["min_gap_minutes","Min minutes between posts"],["max_spend_day","Max spend / day"],["max_spend_campaign","Max spend / campaign"],["max_spend_platform","Max spend / platform"]];
  const RULE_TYPES = [["cpl","Cost per lead too high"],["budget","Budget reached"],["frequency","Frequency too high"],["ctr","CTR collapsed"],["zero_conversions","Spend, no conversions"]];
  const PERIODS = [["daily","Daily"],["weekly","Weekly"],["monthly","Monthly"],["lifetime","Lifetime"]];

  const state = { user: localStorage.getItem("mam_user") || "admin@modpools.local", tab: "dashboard" };
  const isAdmin = () => state.user.startsWith("admin@");
  const canApprove = () => ["admin@","manager@","approver@"].some(p=>state.user.startsWith(p));
  const canEdit = () => ["admin@","manager@","creator@"].some(p=>state.user.startsWith(p));
  const platLabel = (v)=> (PLATFORMS.find(p=>p[0]===v)||[v,v])[1];
  const AUDIENCE_PRESETS = ["Luxury homeowners","Airbnb / short-term-rental owners","Vacation-home owners","Compact-backyard buyers","Requested pricing (retargeting)"];
  const CREATIVE_TYPES = [["image","Image"],["video","Video"],["before_after","Before / after"],["testimonial","Testimonial"],["headline","Headline"],["caption","Caption"],["cta","CTA"]];

  const NAV_MAIN = [
    ["dashboard","▦","Dashboard"], ["create","✎","Create Ads"], ["campaigns","▤","Campaigns"],
    ["approvals","✓","Approvals"], ["calendar","▣","Ad Calendar"],
    ["audiences","◎","Audiences"], ["creatives","▧","Creative Library"], ["analytics","📈","Analytics"],
  ];
  const NAV_ADMIN = [ ["limits","⛒","Ad Limits"], ["budgets","$","Budget Manager"], ["connections","⚭","Connections"], ["settings","⚙","Settings"] ];
  const TITLES = Object.fromEntries([...NAV_MAIN,...NAV_ADMIN].map(n=>[n[0],n[2]]));

  // ---------- utilities ----------
  function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function money(n){ return "$"+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2}); }
  function pct(n){ return (Number(n||0)*100).toFixed(1)+"%"; }
  function fmtDT(s){ if(!s) return "—"; const d=new Date(s); return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}); }
  function pill(s){ return `<span class="pill ${esc(s)}">${esc(String(s).replace(/_/g," "))}</span>`; }
  function toast(msg, kind=""){ const t=document.createElement("div"); t.className="toast "+kind; t.textContent=msg; $("toast").appendChild(t); setTimeout(()=>t.remove(),4200); }

  async function api(path, {method="GET", body}={}) {
    const res = await fetch(path, { method, headers: {"Content-Type":"application/json","X-User-Email":state.user}, body: body!==undefined?JSON.stringify(body):undefined });
    let data=null; try{ data=await res.json(); }catch(e){}
    if(!res.ok) throw new Error((data&&data.detail)||("HTTP "+res.status));
    return data;
  }

  function modal(title, innerHTML, onOk, okLabel="Save"){
    const bg=document.createElement("div"); bg.className="modalbg";
    bg.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><div class="mbody">${innerHTML}</div>
      <div class="actions"><button class="btn ghost" data-x>Cancel</button><button class="btn" data-ok>${esc(okLabel)}</button></div></div>`;
    document.body.appendChild(bg);
    const close=()=>bg.remove();
    bg.querySelector("[data-x]").onclick=close;
    bg.addEventListener("click",e=>{ if(e.target===bg) close(); });
    bg.querySelector("[data-ok]").onclick=async()=>{ try{ await onOk(bg, close); }catch(err){ toast(err.message,"err"); } };
    return bg;
  }
  const val = (bg,name)=> bg.querySelector(`[name=${name}]`).value.trim();
  const opts = (arr, sel)=> arr.map(([v,l])=>`<option value="${v}"${v===sel?" selected":""}>${esc(l)}</option>`).join("");

  // ---------- shell ----------
  function renderNav(pending=0){
    const mk=(list)=> list.map(([id,ic,lbl])=>`<a data-tab="${id}" class="${state.tab===id?"active":""}"><span class="ic">${ic}</span><span class="lbl">${lbl}</span>${id==="approvals"&&pending?`<span class="badge">${pending}</span>`:""}</a>`).join("");
    $("nav-main").innerHTML=mk(NAV_MAIN); $("nav-admin").innerHTML=mk(NAV_ADMIN);
    document.querySelectorAll(".nav a").forEach(a=>a.onclick=()=>go(a.dataset.tab));
  }
  function go(tab){ state.tab=tab; $("topTitle").textContent=TITLES[tab]||tab; renderNav(); render(); }

  async function refreshChrome(){
    try{ const n=await api("/api/notifications?unread_only=false&limit=50"); const c=n.length;
      $("bellCount").style.display=c?"inline-block":"none"; $("bellCount").textContent=c; state._notes=n; }catch(e){}
    if(canApprove()){ try{ const q=await api("/api/approvals"); renderNav(q.length); }catch(e){ renderNav(0); } }
    else { renderNav(0); }
    try{ const d=await api("/api/dashboard"); $("estop").classList.toggle("on", d.emergency_stop); $("estop").innerHTML=(d.emergency_stop?"■ STOPPED — click to clear":"■ Emergency Stop"); }catch(e){}
  }

  // ---------- views ----------
  const V = {};

  V.dashboard = async () => {
    const d = await api("/api/dashboard");
    const k = d.kpis;
    let h = "";
    if(d.emergency_stop) h += `<div class="banner stop">⛔ Emergency Stop is ACTIVE — all live ads are paused and posting is blocked. Use the button top-right to clear it.</div>`;
    h += `<div class="tiles">
      ${tile("Spend", money(k.spend))}${tile("Leads", k.leads)}${tile("CTR", pct(k.ctr))}
      ${tile("Cost / lead", money(k.cpl))}${tile("ROAS", (k.roas||0)+"×")}${tile("Live ads", d.live_ads)}
    </div>
    <div class="tiles">
      ${tile("Active campaigns", d.active_campaigns)}${tile("Pending approvals", d.pending_approvals)}
      ${tile("Scheduled (7d)", d.scheduled_next_7d)}${tile("Unread alerts", d.unread_alerts)}
    </div>`;
    if(isAdmin()) h += `<div class="toolbar"><button class="btn ghost" id="tick">▶ Run scheduler now (sandbox)</button>
      <span class="muted">No background worker in dev — this runs the poster + auto-pause engine once.</span></div>`;
    $("view").innerHTML = h;
    if(isAdmin()) $("tick").onclick = async (e)=>{ e.target.disabled=true; try{ const r=await api("/api/engine/tick",{method:"POST"});
      toast(`Posted ${r.poster.posted}, skipped ${r.poster.skipped}; auto-paused ${r.rule_engine.auto_paused+r.rule_engine.budget_paused}`,"ok"); await refreshChrome(); render(); }catch(err){toast(err.message,"err");e.target.disabled=false;} };
  };
  const tile=(k,v,sm)=>`<div class="tile"><div class="k">${esc(k)}</div><div class="v ${sm?"sm":""}">${esc(v)}</div></div>`;

  V.create = async () => {
    const brands = (await api("/api/brands")).brands;
    const camps = await api("/api/campaigns");
    $("view").innerHTML = `
      <div class="tabs"><button data-m="single" class="active">Single offer</button><button data-m="bulk">Bulk (many offers)</button></div>
      <div class="split">
        <div class="card">
          <label>Brand</label><select id="f_brand">${brands.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join("")}</select>
          <label>Platform</label><select id="f_platform">${opts(PLATFORMS)}</select>
          <label id="lbl_offer">Product / offer / angle</label>
          <textarea id="f_offer" placeholder="Summer install special on the 20ft container pool with the acrylic window."></textarea>
          <div id="hint_bulk" class="muted" style="display:none;font-size:12px;margin-top:5px">One offer per line (up to 25).</div>
          <label>Audience <span class="muted">(optional)</span></label><input id="f_audience" placeholder="Leave blank for brand default" />
          <div class="grid2"><div><label>Goal</label><select id="f_goal">${opts(GOALS,"leads")}</select></div>
          <div><label>Variations</label><select id="f_count"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select></div></div>
          <label>Tone <span class="muted">(optional)</span></label><input id="f_tone" placeholder="e.g. premium, playful" />
          <button class="btn" id="genBtn" style="margin-top:16px;width:100%">Generate ads</button>
        </div>
        <div>
          <div class="toolbar">
            <select id="saveCamp" style="max-width:280px"><option value="">Save results to campaign…</option>${camps.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select>
            <button class="btn good sm" id="saveBtn" disabled>Save to campaign</button>
            <button class="btn ghost sm" id="csvBtn" disabled>Download CSV</button>
            <span class="spacer"></span>
          </div>
          <div id="status" class="muted">Fill in the brief and generate. Results are drafts you review before saving.</div>
          <div id="results" style="margin-top:12px"></div>
        </div>
      </div>`;
    let mode="single", lastRows=[], lastVariations=[], lastPlatform="facebook";
    document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{ mode=b.dataset.m; document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("active",x===b));
      $("lbl_offer").textContent = mode==="bulk"?"Offers (one per line)":"Product / offer / angle"; $("hint_bulk").style.display=mode==="bulk"?"block":"none"; $("genBtn").textContent=mode==="bulk"?"Generate all":"Generate ads"; });

    $("genBtn").onclick = async () => {
      const raw=$("f_offer").value.trim(); if(raw.length<3){ toast("Describe the offer first.","err"); return; }
      const base={ brand:$("f_brand").value, platform:$("f_platform").value, audience:$("f_audience").value.trim()||null, goal:$("f_goal").value, tone:$("f_tone").value.trim()||null, count:parseInt($("f_count").value,10) };
      lastPlatform=base.platform; $("genBtn").disabled=true; $("status").innerHTML=`<span class="spinner"></span>Generating…`; $("results").innerHTML=""; lastRows=[]; lastVariations=[];
      try{
        if(mode==="bulk"){
          const offers=raw.split("\n").map(s=>s.trim()).filter(Boolean).slice(0,25);
          const data=await api("/api/generate/bulk",{method:"POST",body:{...base,products:offers}});
          let html=""; data.items.forEach(it=>{ html+=`<h4 style="color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:5px;margin:16px 0 10px">${esc(it.product)}</h4>`;
            if(it.error){ html+=`<div class="banner warn">⚠ ${esc(it.error)}</div>`; return; }
            html+=`<div class="cardgrid">`+it.variations.map((v,i)=>vcard(v,i)).join("")+`</div>`;
            it.variations.forEach((v,i)=>pushRow(lastRows,base,it.product,v,i)); lastVariations.push(...it.variations); });
          $("results").innerHTML=html;
        } else {
          const data=await api("/api/generate",{method:"POST",body:{...base,product:raw}});
          $("results").innerHTML=`<div class="cardgrid">`+data.variations.map((v,i)=>vcard(v,i)).join("")+`</div>`;
          data.variations.forEach((v,i)=>pushRow(lastRows,base,raw,v,i)); lastVariations=data.variations;
        }
        $("status").textContent = lastVariations.length?`${lastVariations.length} draft ad(s) ready to review.`:"No results.";
        $("saveBtn").disabled = !lastVariations.length; $("csvBtn").disabled = !lastRows.length;
        wireCopy();
      }catch(err){ $("status").innerHTML=`<span style="color:var(--bad)">${esc(err.message)}</span>`; }
      finally{ $("genBtn").disabled=false; }
    };
    $("saveBtn").onclick = async () => {

    else h += `<div class="cardgrid">`+summary.map(b=>{ const over=b.spent>=b.amount; return `<div class="vcard"><h4>${esc(b.scope)} · ${esc(b.period)} ${pill(b.cap_type)}</h4>
      <div class="muted" style="font-size:13px">${b.scope_ref_value?esc(b.scope_ref_value):b.scope_ref_id?"campaign #"+b.scope_ref_id:"all"}</div>
      <div style="font-size:22px;font-weight:700;margin:8px 0">${money(b.spent)} <span class="muted" style="font-size:14px;font-weight:400">/ ${money(b.amount)}</span></div>
      <div style="height:8px;background:var(--panel-2);border-radius:999px;overflow:hidden"><div style="height:100%;width:${Math.min(100,b.used_pct)}%;background:${over?"var(--bad)":b.used_pct>80?"var(--warn)":"var(--good)"}"></div></div>
      <div class="row" style="justify-content:space-between;margin-top:6px"><span class="muted">${b.used_pct}% used</span>${admin?`<button class="btn ghost sm" data-dbg="${b.budget_id}">Delete</button>`:""}</div></div>`; }).join("")+`</div>`;
    $("view").innerHTML=h;
    if($("addB")) $("addB").onclick=()=>modal("Add budget",
      `<label>Scope</label><select name="scope"><option value="global">Global</option><option value="platform">Platform</option><option value="campaign">Campaign</option></select>
       <div class="grid2"><div><label>Platform (if platform)</label><select name="scope_ref_value"><option value="">—</option>${opts(PLATFORMS)}</select></div><div><label>Campaign id (if campaign)</label><input name="scope_ref_id" type="number"/></div></div>
       <div class="grid2"><div><label>Period</label><select name="period">${opts(PERIODS)}</select></div><div><label>Amount ($)</label><input name="amount" type="number" step="any"/></div></div>
       <label>Cap type</label><select name="cap_type"><option value="hard">Hard (pauses ads at cap)</option><option value="soft">Soft (alert)</option></select>`,
      async(bg,close)=>{ const body={scope:val(bg,"scope"),period:val(bg,"period"),amount:parseFloat(val(bg,"amount")),cap_type:val(bg,"cap_type"),scope_ref_value:val(bg,"scope_ref_value")||null,scope_ref_id:val(bg,"scope_ref_id")?parseInt(val(bg,"scope_ref_id"),10):null};
        if(!body.amount) throw new Error("Amount required."); await api("/api/budgets",{method:"POST",body}); toast("Budget added.","ok"); close(); render(); });
    document.querySelectorAll("[data-dbg]").forEach(b=>b.onclick=async()=>{ await api(`/api/budgets/${b.dataset.dbg}`,{method:"DELETE"}); render(); });
  };

  V.connections = async () => {
    const conns = await api("/api/connections");
    const admin = state.user.startsWith("admin@")||state.user.startsWith("manager@");
    const byPlat = Object.fromEntries(conns.map(c=>[c.platform,c]));
    $("view").innerHTML = `<p class="sub">Connect ad accounts. In <b>sandbox</b> mode posting is simulated (no real spend); switch to <b>live</b> once a real adapter + credentials are in place. YouTube runs through the Google connection.</p>
      <div class="cardgrid">`+PLATFORMS.map(([pv,pl])=>{ const c=byPlat[pv]; const cfg=c?.config||{}; const liveReady=["tiktok","facebook","instagram","google_search","google_display","youtube","linkedin"].includes(pv);
        return `<div class="vcard"><h4>${esc(pl)}${liveReady?` <span class="pill" title="Real posting implemented">live-ready</span>`:""}</h4>
          ${c?`<div class="field"><div class="fk">Account</div><div class="fv">${esc(c.account_name||"—")}</div></div>
             <div class="field"><div class="fk">Token</div><div class="fv">${esc(c.token_preview||"—")}</div></div>
             ${pv==="tiktok"&&cfg.adgroup_id?`<div class="field"><div class="fk">Ad group</div><div class="fv">${esc(cfg.adgroup_id)}</div></div>`:""}
             ${(pv==="facebook"||pv==="instagram")&&cfg.adset_id?`<div class="field"><div class="fk">Ad set</div><div class="fv">${esc(cfg.adset_id)}</div></div>`:""}
             <div class="row" style="gap:8px;margin:6px 0">${pill(c.mode)} ${pill(c.status)}</div>`
            :`<div class="muted" style="margin:8px 0">Not connected.</div>`}
          ${admin?`<div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn ghost sm" data-conn="${pv}">${c?"Update":"Connect"}</button>${c&&liveReady&&c.token_preview?`<button class="btn sm" data-test="${pv}">Test connection</button>`:""}${c?`<button class="btn ghost sm" data-disc="${pv}">Disconnect</button>`:""}</div>`:""}</div>`; }).join("")+`</div>`;
    document.querySelectorAll("[data-conn]").forEach(b=>b.onclick=()=>{ const pv=b.dataset.conn; const c=byPlat[pv]; const cfg=c?.config||{}; const isMeta=(pv==="facebook"||pv==="instagram"); const isGoogle=["google_search","google_display","youtube"].includes(pv); const isLinkedIn=(pv==="linkedin");
      const tiktokFields = pv!=="tiktok" ? "" :
        `<div class="grid2"><div><label>Ad group ID</label><input name="cfg_adgroup_id" value="${esc(cfg.adgroup_id||"")}" placeholder="from TikTok Ads Manager"/></div>
         <div><label>Identity ID</label><input name="cfg_identity_id" value="${esc(cfg.identity_id||"")}" placeholder="Assets → Identity"/></div></div>
         <div class="grid2"><div><label>Landing page URL</label><input name="cfg_landing" value="${esc(cfg.landing_page_url||"https://modpools.com")}"/></div>
         <div><label>Display name</label><input name="cfg_display" value="${esc(cfg.display_name||"Modpools")}"/></div></div>
         <div class="muted" style="font-size:12px;margin-top:4px">Ads post into this ad group. Each TikTok ad also needs a video ID attached (campaign screen → 🎬).</div>`;
      const metaFields = !isMeta ? "" :
        `<div class="grid2"><div><label>Facebook Page ID</label><input name="cfg_page_id" value="${esc(cfg.page_id||"")}" placeholder="required"/></div>
         <div><label>Ad set ID</label><input name="cfg_adset_id" value="${esc(cfg.adset_id||"")}" placeholder="from Meta Ads Manager"/></div></div>
         <div class="grid2"><div><label>Landing page URL</label><input name="cfg_landing" value="${esc(cfg.landing_page_url||"https://modpools.com")}"/></div>
         <div><label>Instagram actor ID ${pv==="instagram"?"(required)":"(optional)"}</label><input name="cfg_ig" value="${esc(cfg.instagram_actor_id||"")}"/></div></div>
         <div class="muted" style="font-size:12px;margin-top:4px">Facebook & Instagram share one Meta ad account. Ads post into this ad set. Optionally attach a Meta image hash per ad (campaign screen → 🖼).</div>`;
      const googleFields = !isGoogle ? "" :
        `<div class="grid2"><div><label>Customer ID (digits)</label><input name="cfg_customer_id" value="${esc(cfg.customer_id||"")}" placeholder="1234567890"/></div>
         <div><label>Login/MCC ID (optional)</label><input name="cfg_login_cid" value="${esc(cfg.login_customer_id||"")}"/></div></div>
         <div class="grid2"><div><label>Ad group ID</label><input name="cfg_ad_group_id" value="${esc(cfg.ad_group_id||"")}" placeholder="from Google Ads"/></div>
         <div><label>Landing page URL</label><input name="cfg_landing" value="${esc(cfg.landing_page_url||"https://modpools.com")}"/></div></div>
         <div style="margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:8px">
           <div class="muted" style="font-size:12px;margin-bottom:6px">Google credentials ${c?"(leave all blank to keep)":""} — from your Google Cloud OAuth app + approved developer token:</div>
           <div class="grid2"><div><label>Refresh token</label><input name="g_refresh" placeholder="stored encrypted"/></div>
           <div><label>Developer token</label><input name="g_dev" placeholder="stored encrypted"/></div></div>
           <div class="grid2"><div><label>OAuth client ID</label><input name="g_cid" placeholder="stored encrypted"/></div>
           <div><label>OAuth client secret</label><input name="g_secret" placeholder="stored encrypted"/></div></div>
         </div>
         <div class="muted" style="font-size:12px;margin-top:4px">${pv==="youtube"?"YouTube ads need a video ID attached per ad (campaign screen → 🎬).":pv==="google_display"?"Display ads need an image asset resource name attached per ad (campaign screen → 🖼).":"Search ads are text-only — no media needed."}</div>`;
      const linkedinFields = !isLinkedIn ? "" :
        `<div class="grid2"><div><label>Organization (Page) ID</label><input name="cfg_org_id" value="${esc(cfg.organization_id||"")}" placeholder="digits"/></div>
         <div><label>Campaign ID</label><input name="cfg_campaign_id" value="${esc(cfg.campaign_id||"")}" placeholder="from Campaign Manager"/></div></div>
         <div><label>Landing page URL</label><input name="cfg_landing" value="${esc(cfg.landing_page_url||"https://modpools.com")}"/></div>
         <div class="muted" style="font-size:12px;margin-top:4px">The ad is posted by your LinkedIn Page and run under this campaign.</div>`;
      const acctLabel = pv==="tiktok"?"Advertiser ID (numeric)":isMeta?"Ad account ID (act_… or number)":isGoogle?"(not used — set Customer ID below)":isLinkedIn?"Sponsored ad account ID (digits)":"Ad account id";
      modal(`Connect ${platLabel(pv)}`,
        `<label>Account name</label><input name="account_name" value="${esc(c?.account_name||"")}"/>
         ${isGoogle?"":`<label>${acctLabel}</label><input name="external_account_id" value="${esc(c?.external_account_id||"")}"/>`}
         ${(isGoogle||isLinkedIn)?"":`<label>Access token ${c?"(leave blank to keep)":""}</label><input name="access_token" placeholder="stored encrypted, shown masked"/>`}
         ${isLinkedIn?`<label>Access token ${c?"(leave blank to keep)":""}</label><input name="access_token" placeholder="stored encrypted, shown masked"/>`:""}
         ${tiktokFields}${metaFields}${googleFields}${linkedinFields}
         <label>Mode</label><select name="mode"><option value="sandbox"${c?.mode!=="live"?" selected":""}>Sandbox (simulated)</option><option value="live"${c?.mode==="live"?" selected":""}>Live (real posting)</option></select>`,
        async(bg,close)=>{ const body={platform:pv,account_name:val(bg,"account_name")||null,mode:val(bg,"mode")};
          if(!isGoogle) body.external_account_id=val(bg,"external_account_id")||null;
          if(!isGoogle){ const tok=val(bg,"access_token"); if(tok) body.access_token=tok; }
          if(pv==="tiktok") body.config={adgroup_id:val(bg,"cfg_adgroup_id")||null,identity_id:val(bg,"cfg_identity_id")||null,identity_type:"CUSTOMIZED_USER",landing_page_url:val(bg,"cfg_landing")||null,display_name:val(bg,"cfg_display")||null};
          if(isMeta) body.config={page_id:val(bg,"cfg_page_id")||null,adset_id:val(bg,"cfg_adset_id")||null,landing_page_url:val(bg,"cfg_landing")||null,instagram_actor_id:val(bg,"cfg_ig")||null};
          if(isGoogle){ body.config={customer_id:val(bg,"cfg_customer_id")||null,login_customer_id:val(bg,"cfg_login_cid")||null,ad_group_id:val(bg,"cfg_ad_group_id")||null,landing_page_url:val(bg,"cfg_landing")||null};
            const r=val(bg,"g_refresh"),d=val(bg,"g_dev"),ci=val(bg,"g_cid"),se=val(bg,"g_secret");
            if(r||d||ci||se){ if(!(r&&d&&ci&&se)) throw new Error("Fill all four Google credential fields together (refresh token, developer token, client ID, client secret)."); body.access_token=JSON.stringify({refresh_token:r,developer_token:d,client_id:ci,client_secret:se}); } }
          if(isLinkedIn) body.config={organization_id:val(bg,"cfg_org_id")||null,campaign_id:val(bg,"cfg_campaign_id")||null,landing_page_url:val(bg,"cfg_landing")||null};
          await api("/api/connections",{method:"PUT",body}); toast("Connection saved.","ok"); close(); render(); }); });
    document.querySelectorAll("[data-test]").forEach(b=>b.onclick=async()=>{ b.disabled=true; b.textContent="Testing…";
      try{ const r=await api(`/api/connections/${b.dataset.test}/test`,{method:"POST"});
        toast(`Connected: ${r.account?.name||"account"} (${r.account?.currency||""} ${r.account?.status||"ok"})`,"ok"); render(); }
      catch(e){ toast(e.message,"err"); b.disabled=false; b.textContent="Test connection"; } });
    document.querySelectorAll("[data-disc]").forEach(b=>b.onclick=async()=>{ await api(`/api/connections/${b.dataset.disc}`,{method:"DELETE"}); toast("Disconnected.","ok"); render(); });
  };

  V.settings = async () => {
    const [health, s] = await Promise.all([ api("/api/health"), api("/api/settings") ]);
    const admin = state.user.startsWith("admin@")||state.user.startsWith("manager@");
    const providers = health.ai_providers||[];
    const has = p => providers.includes(p);
    const provRow = (p, label, help, signup) => `<div class="vcard">
      <div class="row" style="justify-content:space-between;align-items:center"><h4 style="margin:0">${esc(label)}</h4>${has(p)?`<span class="pill connected">key set</span>`:`<span class="pill" style="opacity:.6">no key</span>`}</div>
      <div class="muted" style="font-size:13px;margin:8px 0">${help} ${signup?`<a href="${signup}" target="_blank" rel="noopener">Get a key ↗</a>`:""}</div>
      ${admin?`<div class="row" style="gap:8px"><input name="key_${p}" type="password" placeholder="paste ${esc(label)} API key" style="flex:1"/><button class="btn sm" data-savekey="${p}">Save</button></div>`:""}</div>`;
    $("view").innerHTML = `<p class="sub">The AI writes your ad copy. It works with <b>Claude (Anthropic)</b> or <b>OpenAI</b> — add whichever key you can fund and generation turns on immediately. Keys are stored encrypted and shown only as “key set”.</p>
      <div style="margin:6px 0 14px"><b>Active generation:</b> ${providers.length?`<span class="pill connected">${esc(providers[0])}</span> ${providers.length>1?`<span class="muted">(fallback: ${esc(providers.slice(1).join(", "))})</span>`:""}`:`<span class="pill" style="background:var(--bad)">none — add a key below</span>`}</div>
      <div class="cardgrid">
        ${provRow("anthropic","Claude (Anthropic)","Best quality; the app was built for it. Buy credits at platform.claude.com.","https://platform.claude.com/settings/billing")}
        ${provRow("openai","OpenAI (GPT)","Easiest to fund if Anthropic billing won’t work for you. Buy credits at platform.openai.com.","https://platform.openai.com/api-keys")}
      </div>
      <div class="card" style="margin-top:16px"><h3 style="margin-top:0">How keys are chosen</h3>
        <p class="muted">A key you set <b>here</b> always wins over one left in the server environment, and if one provider errors the other is tried automatically. Setting a key takes effect right away — no redeploy needed. <b>Photo generation</b> uses OpenAI, so add an OpenAI key to generate ad images.</p></div>`;
    document.querySelectorAll("[data-savekey]").forEach(b=>b.onclick=async()=>{
      const p=b.dataset.savekey; const inp=document.querySelector(`[name=key_${p}]`); const value=inp.value.trim();
      if(!value){ toast("Paste a key first.","err"); return; }
      b.disabled=true; b.textContent="Saving…";
      try{ await api("/api/settings/api-keys",{method:"PUT",body:{name:p,value}}); toast(`${p} key saved — AI generation is on.`,"ok"); render(); }
      catch(e){ toast(e.message,"err"); b.disabled=false; b.textContent="Save"; } });
  };

  V.audiences = async () => {
    const auds = await api("/api/audiences");
    const edit = canEdit();
    let h = `<p class="sub">Saved audiences the AI writes toward and your campaigns target.</p>
      <div class="toolbar"><button class="btn" id="newAud" ${edit?"":"disabled"}>+ New audience</button><span class="spacer"></span><span class="muted">${auds.length} audience(s)</span></div>`;
    if(!auds.length) h += `<div class="empty">No audiences yet.${edit?" Add one below, or use a quick-start.":""}</div>`;
    else h += `<div class="cardgrid">`+auds.map(a=>`<div class="vcard"><h4>${esc(a.name)}</h4>
      ${a.description?`<div class="field"><div class="fv">${esc(a.description)}</div></div>`:""}
      <div class="row" style="gap:6px;margin:6px 0"><span class="pill">${esc((a.source_type||"custom").replace(/_/g," "))}</span></div>
      ${(a.interests&&a.interests.length)?`<div class="tags">${a.interests.map(i=>`<span class="tag">${esc(i)}</span>`).join("")}</div>`:""}
      ${edit?`<button class="btn ghost sm" data-da="${a.id}" style="margin-top:10px">Delete</button>`:""}</div>`).join("")+`</div>`;
    if(edit){
      const existing = new Set(auds.map(a=>a.name));
      const chips = AUDIENCE_PRESETS.filter(p=>!existing.has(p));
      if(chips.length) h += `<div class="card" style="margin-top:16px"><div class="muted" style="font-size:13px;margin-bottom:8px">Quick-start (Modpools audiences)</div>
        <div class="row" style="gap:8px">${chips.map(p=>`<button class="btn ghost sm" data-preset="${esc(p)}">+ ${esc(p)}</button>`).join("")}</div></div>`;
    }
    $("view").innerHTML=h;
    async function add(name, description, source_type, interests){
      await api("/api/audiences",{method:"POST",body:{name,description:description||null,source_type:source_type||"custom",interests:interests&&interests.length?interests:null}});
      toast("Audience saved.","ok"); render();
    }
    if($("newAud")) $("newAud").onclick=()=>modal("New audience",
      `<label>Name</label><input name="name" placeholder="Luxury homeowners"/>
       <label>Description <span class="muted">(optional)</span></label><textarea name="description" placeholder="Who this audience is, for the AI to write toward."></textarea>
       <label>Type</label><select name="source_type"><option value="custom">Custom</option><option value="retargeting">Retargeting</option><option value="lookalike">Lookalike</option></select>
       <label>Interests <span class="muted">(comma-separated, optional)</span></label><input name="interests" placeholder="pools, luxury home, backyard design"/>`,
      async(bg,close)=>{ const name=val(bg,"name"); if(!name) throw new Error("Name is required.");
        const interests=val(bg,"interests").split(",").map(s=>s.trim()).filter(Boolean);
        await add(name,val(bg,"description"),val(bg,"source_type"),interests); close(); });
    document.querySelectorAll("[data-preset]").forEach(b=>b.onclick=()=>add(b.dataset.preset,"","custom",[]));
    document.querySelectorAll("[data-da]").forEach(b=>b.onclick=async()=>{ await api(`/api/audiences/${b.dataset.da}`,{method:"DELETE"}); render(); });
  };

  V.creatives = async () => {
    const items = await api("/api/creatives");
    const edit = canEdit();
    let h = `<p class="sub">Reusable images, videos, headlines, testimonials and before/after visuals.</p>
      <div class="toolbar"><button class="btn" id="newCr" ${edit?"":"disabled"}>+ New creative</button><span class="spacer"></span><span class="muted">${items.length} item(s)</span></div>`;
    if(!items.length) h += `<div class="empty">Nothing in the library yet.</div>`;
    else h += `<div class="cardgrid">`+items.map(c=>`<div class="vcard"><h4>${esc(c.name)} ${c.approved?`<span class="pill approved" style="font-size:11px">approved</span>`:""}</h4>
      <div class="row" style="gap:6px;margin:4px 0"><span class="pill">${esc((CREATIVE_TYPES.find(t=>t[0]===c.type)||[c.type,c.type])[1])}</span></div>
      ${c.url&&(c.type==="image"||c.url.startsWith("data:image"))?`<img src="${esc(c.url)}" alt="${esc(c.name)}" style="width:100%;border-radius:8px;border:1px solid var(--line);margin:6px 0"/><a href="${esc(c.url)}" download="creative-${c.id}.png" class="btn ghost sm" style="margin-bottom:4px">⤓ Download</a>`
        :c.url?`<div class="field"><div class="fk">Asset</div><div class="fv"><a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.url).slice(0,60)}</a></div></div>`:""}
      ${c.body?`<div class="field"><div class="fv">${esc(c.body)}</div></div>`:""}
      ${(c.tags&&c.tags.length)?`<div class="tags">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`:""}
      ${edit?`<div class="row" style="gap:8px;margin-top:10px">${c.approved?"":`<button class="btn good sm" data-ca="${c.id}">Approve</button>`}<button class="btn ghost sm" data-dc="${c.id}">Delete</button></div>`:""}</div>`).join("")+`</div>`;
    $("view").innerHTML=h;
    if($("newCr")) $("newCr").onclick=()=>modal("New creative",
      `<label>Type</label><select name="type">${opts(CREATIVE_TYPES)}</select>
       <label>Name</label><input name="name" placeholder="Golden-hour backyard hero shot"/>
       <label>Link to image/video <span class="muted">(for image/video)</span></label><input name="url" placeholder="https://…"/>
       <label>Text <span class="muted">(for headline/caption/CTA/testimonial)</span></label><textarea name="body"></textarea>
       <label>Tags <span class="muted">(comma-separated, optional)</span></label><input name="tags" placeholder="summer, 20ft, acrylic-window"/>`,
      async(bg,close)=>{ const name=val(bg,"name"); if(!name) throw new Error("Name is required.");
        const tags=val(bg,"tags").split(",").map(s=>s.trim()).filter(Boolean);
        await api("/api/creatives",{method:"POST",body:{type:val(bg,"type"),name,url:val(bg,"url")||null,body:val(bg,"body")||null,tags}});
        toast("Creative saved.","ok"); close(); render(); });
    document.querySelectorAll("[data-ca]").forEach(b=>b.onclick=async()=>{ await api(`/api/creatives/${b.dataset.ca}/approve`,{method:"POST"}); toast("Approved.","ok"); render(); });
    document.querySelectorAll("[data-dc]").forEach(b=>b.onclick=async()=>{ await api(`/api/creatives/${b.dataset.dc}`,{method:"DELETE"}); render(); });
  };

  // ---------- boot ----------
  async function render(){ const v=V[state.tab]; if(!v){ $("view").innerHTML=`<div class="empty">Coming soon.</div>`; return; }
    $("view").innerHTML=`<div class="muted"><span class="spinner"></span>Loading…</div>`;
    try{ await v(); }catch(err){ $("view").innerHTML=`<div class="banner stop">${esc(err.message)}</div>`; } }

  $("userPick").innerHTML = USERS.map(([e,l])=>`<option value="${e}"${e===state.user?" selected":""}>${esc(l)}</option>`).join("");
  $("userPick").onchange = (e)=>{ state.user=e.target.value; localStorage.setItem("mam_user",state.user); refreshChrome(); render(); };
  $("bell").onclick = ()=>{ const notes=state._notes||[]; modal("Notifications",
    notes.length?notes.map(n=>`<div class="field"><div class="fk">${esc(n.type.replace(/_/g," "))} · ${fmtDT(n.created_at)}</div><div class="fv">${esc(n.message)}</div></div>`).join(""):`<div class="empty">No notifications.</div>`,
    async(bg,close)=>close(),"Close"); };
  $("estop").onclick = async ()=>{ const on=$("estop").classList.contains("on");
    if(!on && !confirm("Activate Emergency Stop? This pauses ALL live ads and blocks new posting.")) return;
    try{ await api("/api/settings/emergency-stop",{method:"POST",body:{active:!on}}); toast(on?"Emergency stop cleared.":"EMERGENCY STOP activated.", on?"ok":"err"); await refreshChrome(); render(); }catch(e){toast(e.message,"err");} };

  renderNav(); go("dashboard"); refreshChrome();
  setInterval(refreshChrome, 20000);
  </script>
</body>
</html>
