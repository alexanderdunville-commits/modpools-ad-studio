<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modpools Ad Studio</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: #16212e;
      --panel-2: #1d2a39;
      --line: #2a3a4d;
      --text: #e8eef5;
      --muted: #97a6b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --good: #34d399;
      --bad: #f87171;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 28px 24px 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    header h1 { margin: 0 0 4px; font-size: 26px; }
    header p { margin: 0; color: var(--muted); }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 24px 60px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }
    @media (max-width: 880px) { .wrap { grid-template-columns: 1fr; } }
    form {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      align-self: start;
      position: sticky;
      top: 16px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
    input, select, textarea {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 84px; }
    textarea#product { min-height: 84px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      margin-top: 18px;
      width: 100%;
      background: var(--accent-2);
      color: #051018;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .tabs { display: flex; gap: 6px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 4px; margin-bottom: 16px; }
    .tab {
      flex: 1; margin: 0; background: transparent; color: var(--muted);
      padding: 8px; font-size: 13px; font-weight: 600; border-radius: 6px;
    }
    .tab:hover { background: transparent; color: var(--text); }
    .tab.active { background: var(--accent-2); color: #051018; }
    .results { min-height: 200px; }
    .results-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .results-head h2 { font-size: 16px; margin: 0; }
    .export-btn { margin: 0; width: auto; padding: 8px 16px; font-size: 13px; background: var(--good); }
    .export-btn:hover { background: #2bb88a; }
    .status { color: var(--muted); padding: 24px 4px; }
    .status.error { color: var(--bad); }
    .group-head { margin: 22px 0 10px; font-size: 14px; color: var(--accent); border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .group-head:first-child { margin-top: 0; }
    .group-error { color: var(--bad); font-size: 13px; padding: 4px 0 8px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 1100px) { .cards { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .card h3 { margin: 0 0 8px; font-size: 17px; }
    .field { margin: 10px 0; }
    .field .k { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .field .v { font-size: 14px; white-space: pre-wrap; }
    .cta { display: inline-block; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px 12px; font-size: 13px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; font-size: 12px; color: var(--accent); }
    .visual { font-style: italic; color: var(--muted); }
    .rationale { font-size: 12px; color: var(--muted); border-top: 1px dashed var(--line); padding-top: 10px; margin-top: 12px; }
    .copy-btn { margin-top: 12px; width: auto; padding: 6px 14px; font-size: 13px; }
    .banner { background: #3b2a12; border: 1px solid #7c5418; color: #f5d597; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #051018; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -3px; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Modpools Ad Studio</h1>
    <p>Describe an offer, pick a brand and platform, and generate on-brand ad variations.</p>
  </header>

  <div class="wrap">
    <form id="brief">
      <div id="keyBanner" class="banner" style="display:none">
        No <code>ANTHROPIC_API_KEY</code> configured. Add one to <code>.env</code> and restart.
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="tab active" data-mode="single">Single offer</button>
        <button type="button" class="tab" data-mode="bulk">Bulk (many offers)</button>
      </div>

      <label for="brand">Brand</label>
      <select id="brand" name="brand"></select>

      <label for="platform">Platform</label>
      <select id="platform" name="platform">
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="google_search">Google Search</option>
        <option value="google_display">Google Display</option>
        <option value="linkedin">LinkedIn</option>
      </select>

      <label for="product" id="productLabel">Product / offer / angle</label>
      <textarea id="product" name="product" placeholder="e.g. Summer install special on the 20ft container pool with the acrylic window."></textarea>
      <div class="hint" id="bulkHint" style="display:none">One offer per line — each line becomes its own set of ads. Up to 25 per batch.</div>

      <label for="audience">Audience <span class="hint">(optional — overrides the brand default)</span></label>
      <input id="audience" name="audience" placeholder="Leave blank to use the brand default" />

      <div class="row">
        <div>
          <label for="goal">Goal</label>
          <select id="goal" name="goal">
            <option value="awareness">Brand awareness</option>
            <option value="traffic">Website traffic</option>
            <option value="leads" selected>Lead generation</option>
            <option value="sales">Sales / conversions</option>
            <option value="engagement">Engagement</option>
          </select>
        </div>
        <div>
          <label for="count">Variations</label>
          <select id="count" name="count">
            <option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option>
          </select>
        </div>
      </div>

      <label for="tone">Tone <span class="hint">(optional)</span></label>
      <input id="tone" name="tone" placeholder="e.g. playful, premium, urgent" />

      <button id="submit" type="submit">Generate ads</button>
    </form>

    <div class="results">
      <div class="results-head">
        <h2 id="resultsTitle"></h2>
        <button type="button" id="exportBtn" class="export-btn" style="display:none">Download CSV</button>
      </div>
      <div id="status" class="status">Fill in the brief and click <strong>Generate ads</strong>.</div>
      <div id="cards"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let mode = "single";
    let lastRows = []; // flattened rows for CSV export

    async function loadBrands() {
      try {
        const res = await fetch("/api/brands");
        const data = await res.json();
        const sel = $("brand");
        sel.innerHTML = "";
        for (const b of data.brands) {
          const opt = document.createElement("option");
          opt.value = b.id;
          opt.textContent = b.name;
          sel.appendChild(opt);
        }
      } catch (e) { /* leave default empty */ }
    }

    async function checkHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        if (!data.api_key_configured) $("keyBanner").style.display = "block";
      } catch (e) { /* ignore */ }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function setMode(next) {
      mode = next;
      document.querySelectorAll(".tab").forEach((t) =>
        t.classList.toggle("active", t.dataset.mode === next));
      const bulk = next === "bulk";
      $("productLabel").textContent = bulk ? "Offers (one per line)" : "Product / offer / angle";
      $("bulkHint").style.display = bulk ? "block" : "none";
      $("product").placeholder = bulk
        ? "20ft container pool summer install special\nAcrylic-window pool upgrade\nMove-in-ready backyard pool, installed in a day"
        : "e.g. Summer install special on the 20ft container pool with the acrylic window.";
      $("submit").textContent = bulk ? "Generate all" : "Generate ads";
    }

    function variationCard(v, i) {
      const tags = (v.hashtags || []).map((t) =>
        `<span class="tag">${escapeHtml(t.startsWith("#") ? t : "#" + t)}</span>`).join("");
      const copyText = [
        `Headline: ${v.headline}`,
        `Primary text: ${v.primary_text}`,
        `Description: ${v.description}`,
        `CTA: ${v.call_to_action}`,
        (v.hashtags || []).length ? `Hashtags: ${(v.hashtags || []).join(" ")}` : "",
        `Visual concept: ${v.visual_concept}`,
      ].filter(Boolean).join("\n");

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>Variation ${i + 1}</h3>
        <div class="field"><div class="k">Headline</div><div class="v">${escapeHtml(v.headline)}</div></div>
        <div class="field"><div class="k">Primary text</div><div class="v">${escapeHtml(v.primary_text)}</div></div>
        <div class="field"><div class="k">Description</div><div class="v">${escapeHtml(v.description)}</div></div>
        <div class="field"><div class="k">Call to action</div><div class="v"><span class="cta">${escapeHtml(v.call_to_action)}</span></div></div>
        ${tags ? `<div class="field"><div class="k">Hashtags</div><div class="tags">${tags}</div></div>` : ""}
        <div class="field"><div class="k">Visual concept</div><div class="v visual">${escapeHtml(v.visual_concept)}</div></div>
        <div class="rationale">${escapeHtml(v.rationale)}</div>
        <button class="copy-btn" type="button">Copy</button>
      `;
      const btn = card.querySelector(".copy-btn");
      btn.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(copyText); btn.textContent = "Copied!"; }
        catch (e) { btn.textContent = "Copy failed"; }
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      });
      return card;
    }

    function pushRows(meta, offer, variations) {
      variations.forEach((v, i) => {
        lastRows.push({
          brand: meta.brand, platform: meta.platform, offer,
          variation: i + 1,
          headline: v.headline, primary_text: v.primary_text, description: v.description,
          call_to_action: v.call_to_action, hashtags: (v.hashtags || []).join(" "),
          visual_concept: v.visual_concept, rationale: v.rationale,
        });
      });
    }

    function csvCell(s) {
      const v = String(s ?? "");
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }

    function downloadCsv() {
      if (!lastRows.length) return;
      const cols = ["brand","platform","offer","variation","headline","primary_text",
        "description","call_to_action","hashtags","visual_concept","rationale"];
      const lines = [cols.join(",")];
      for (const r of lastRows) lines.push(cols.map((c) => csvCell(r[c])).join(","));
      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `modpools-ads-${stamp}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function runSingle(body, status, cards) {
      const res = await fetch("/api/generate", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Generation failed.");
      status.textContent = "";
      data.variations.forEach((v, i) => cards.appendChild(variationCard(v, i)));
      if (!data.variations.length) status.textContent = "No variations returned. Try again.";
      pushRows({ brand: data.brand, platform: data.platform }, body.product, data.variations);
    }

    async function runBulk(body, offers, status, cards) {
      const res = await fetch("/api/generate/bulk", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...body, products: offers }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Generation failed.");
      status.textContent = "";
      let total = 0;
      for (const item of data.items) {
        const head = document.createElement("div");
        head.className = "group-head";
        head.textContent = item.product;
        cards.appendChild(head);
        if (item.error) {
          const err = document.createElement("div");
          err.className = "group-error";
          err.textContent = "⚠ " + item.error;
          cards.appendChild(err);
          continue;
        }
        const grid = document.createElement("div");
        grid.className = "cards";
        item.variations.forEach((v, i) => grid.appendChild(variationCard(v, i)));
        cards.appendChild(grid);
        pushRows({ brand: data.brand, platform: data.platform }, item.product, item.variations);
        total += item.variations.length;
      }
      if (!total) status.textContent = "No variations were generated. Check your offers and try again.";
    }

    document.querySelectorAll(".tab").forEach((t) =>
      t.addEventListener("click", () => setMode(t.dataset.mode)));

    $("exportBtn").addEventListener("click", downloadCsv);

    $("brief").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = $("status");
      const cards = $("cards");
      const submit = $("submit");
      cards.innerHTML = "";
      lastRows = [];
      $("exportBtn").style.display = "none";
      $("resultsTitle").textContent = "";
      status.className = "status";

      const raw = $("product").value.trim();
      if (raw.length < 3) {
        status.className = "status error";
        status.textContent = mode === "bulk"
          ? "Add at least one offer (one per line)."
          : "Please describe the product or offer (at least a few words).";
        return;
      }

      const base = {
        brand: $("brand").value,
        platform: $("platform").value,
        audience: $("audience").value.trim() || null,
        goal: $("goal").value,
        tone: $("tone").value.trim() || null,
        count: parseInt($("count").value, 10),
      };

      submit.disabled = true;

      try {
        if (mode === "bulk") {
          const offers = raw.split("\n").map((s) => s.trim()).filter(Boolean).slice(0, 25);
          status.innerHTML = `<span class="spinner"></span>Generating ads for ${offers.length} offer(s)… this can take a moment.`;
          await runBulk(base, offers, status, cards);
        } else {
          status.innerHTML = '<span class="spinner"></span>Generating on-brand variations…';
          await runSingle({ ...base, product: raw }, status, cards);
        }
        if (lastRows.length) {
          $("resultsTitle").textContent = `${lastRows.length} ad(s) ready to review`;
          $("exportBtn").style.display = "inline-block";
        }
      } catch (err) {
        status.className = "status error";
        status.textContent = err.message || "Something went wrong.";
      } finally {
        submit.disabled = false;
      }
    });

    loadBrands();
    checkHealth();
    setMode("single");
  </script>
</body>
</html>
