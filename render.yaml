# Render.com deploy blueprint for Modpools Ad Manager.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# creates the web service AND a persistent Postgres database. You'll be asked to
# fill in APP_PASSWORD and (optionally) ANTHROPIC_API_KEY. See docs/DEPLOY.md.

# Persistent database — everything the app saves (campaigns, ads, generated
# photos/videos, connections, settings) lives here, so it survives restarts and
# redeploys. NOTE: Render's free database plan is deleted after ~30 days; move
# it to a paid plan (a few dollars/month) to keep your data permanently.
databases:
  - name: modpools-db
    databaseName: modpools
    user: modpools
    plan: free

services:
  - type: web
    name: modpools-ad-manager
    runtime: python
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Persistent storage — points the app at the Postgres database above so
      # nothing is lost on restart/redeploy.
      - key: DATABASE_URL
        fromDatabase:
          name: modpools-db
          property: connectionString
      # Shared password to open the app (you choose it during setup).
      - key: APP_PASSWORD
        sync: false
      # Needed only for the AI "Create Ads" tab. Paste your Claude API key.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Auto-generated secret used to encrypt stored platform tokens.
      # Keep this stable — regenerating it makes existing encrypted keys unreadable.
      - key: SECRET_ENCRYPTION_KEY
        generateValue: true
