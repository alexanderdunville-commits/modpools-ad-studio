# Render.com deploy blueprint for Modpools Ad Manager.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# creates the web service. You'll be asked to fill in APP_PASSWORD and
# (optionally) ANTHROPIC_API_KEY. See docs/DEPLOY.md for step-by-step help.
services:
  - type: web
    name: modpools-ad-manager
    runtime: python
    branch: claude/new-session-3r36ei
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Shared password to open the app (you choose it during setup).
      - key: APP_PASSWORD
        sync: false
      # Needed only for the AI "Create Ads" tab. Paste your Claude API key.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Auto-generated secret used to encrypt stored platform tokens.
      - key: SECRET_ENCRYPTION_KEY
        generateValue: true
